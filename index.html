<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="小説保管庫">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>小説保管庫</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f5f5f3;
  --bg-soft: #fbfbfa;
  --panel: #ffffff;
  --panel-2: #f0f0ee;
  --ink: #0b0b0b;
  --text: #151515;
  --muted: #77736d;
  --muted-2: #9a958d;
  --line: #dedbd4;
  --line-strong: #101010;
  --accent: #111111;
  --accent-text: #ffffff;
  --danger: #9f1d1d;
  --warn: #7a5400;
  --success: #236b34;
  --shadow: 0 20px 60px rgba(0, 0, 0, .08);
  --shadow-soft: 0 12px 32px rgba(0, 0, 0, .055);
  --radius: 22px;
  --radius-sm: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; }
html { min-height: 100%; background: var(--bg); overflow-x: hidden; }
html, body { margin: 0; color: var(--text); max-width: 100%; overflow-x: hidden; }
body {
  min-height: 100vh;
  min-height: 100dvh;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Meiryo", sans-serif;
  line-height: 1.65;
  -webkit-text-size-adjust: 100%;
  background:
    radial-gradient(circle at 9% 0%, rgba(0,0,0,.045), transparent 24rem),
    linear-gradient(180deg, #fbfbfa 0%, #f3f3f1 42%, #eeeeeb 100%);
}
button, input, textarea, select { font: inherit; }
button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
button:disabled { opacity: .45; cursor: not-allowed; }
.hidden { display: none !important; }
.app-shell.is-loading { opacity: .65; pointer-events: none; }
::selection { background: #111; color: #fff; }

.lock-screen {
  min-height: 100vh;
  min-height: 100dvh;
  display: grid;
  place-items: center;
  padding: calc(24px + var(--safe-top)) 18px calc(24px + var(--safe-bottom));
  background:
    radial-gradient(circle at top left, rgba(0,0,0,.10), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0,0,0,.06), transparent 35%),
    linear-gradient(135deg, #ffffff, #efefed);
}
.lock-card {
  width: min(440px, 100%);
  background: rgba(255, 255, 255, .88);
  border: 1px solid rgba(0,0,0,.10);
  border-radius: 32px;
  box-shadow: 0 28px 90px rgba(0,0,0,.13);
  padding: 32px;
  backdrop-filter: blur(18px);
}
.app-mark {
  width: 58px; height: 58px;
  border-radius: 20px;
  background: #111; color: #fff;
  display: grid; place-items: center;
  font-weight: 900; font-size: 26px;
  margin-bottom: 20px;
  box-shadow: 0 16px 36px rgba(0,0,0,.20);
}
.eyebrow {
  margin: 0 0 4px;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: .16em;
  font-weight: 850;
  text-transform: uppercase;
}
h1, h2, h3 { line-height: 1.25; margin: 0; letter-spacing: -.02em; }
.lock-card h1 { font-size: 30px; margin-bottom: 8px; }
.muted { color: var(--muted); }
.micro { font-size: 12px; }
.lock-form { display: grid; gap: 11px; margin: 22px 0 10px; }

input, textarea, select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 15px;
  background: rgba(255,255,255,.94);
  color: var(--text);
  padding: 13px 14px;
  outline: none;
  transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
}
textarea { min-height: 140px; resize: vertical; }
input:focus, textarea:focus, select:focus {
  border-color: #111;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(0,0,0,.07);
}
input::placeholder, textarea::placeholder { color: #aaa49b; }

.primary, .ghost, .text-button, .danger-button, .secondary {
  border: 1px solid #111;
  border-radius: 999px;
  min-height: 39px;
  padding: 9px 16px;
  background: #111;
  color: #fff;
  font-weight: 850;
  letter-spacing: -.01em;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
  box-shadow: 0 8px 18px rgba(0,0,0,.08);
}
.primary:hover, .ghost:hover, .secondary:hover, .danger-button:hover { transform: translateY(-1px); }
.primary:active, .ghost:active, .secondary:active, .danger-button:active { transform: translateY(0); }
.wide { width: 100%; }
.ghost { background: #fff; color: #111; box-shadow: none; }
.secondary { background: #f3f3f1; color: #111; border-color: var(--line); box-shadow: none; }
.small { min-height: 32px; padding: 6px 12px; font-size: 13px; }
.text-button {
  background: transparent;
  border-color: transparent;
  color: #111;
  min-height: auto;
  padding: 8px 0;
  border-radius: 0;
  box-shadow: none;
}
.text-button:hover { transform: none; text-decoration: underline; text-underline-offset: 4px; }
.text-button.danger, .danger { color: var(--danger); }
.danger-button { background: var(--danger); border-color: var(--danger); color: #fff; }
.icon-button {
  width: 40px; height: 40px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(255,255,255,.86);
  color: #111;
  font-weight: 900;
  display: inline-grid;
  place-items: center;
}

.main-app { min-height: 100vh; min-height: 100dvh; }
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: calc(13px + var(--safe-top)) 22px 13px;
  background: rgba(245,245,243,.82);
  backdrop-filter: blur(20px) saturate(1.25);
  border-bottom: 1px solid rgba(0,0,0,.075);
}
.topbar h1 { font-size: 21px; letter-spacing: -.03em; }
.menu-button { display: none; }
.layout {
  width: min(1280px, 100%);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 236px minmax(0, 1fr);
  gap: 22px;
  padding: 22px;
}
.side-nav {
  position: sticky;
  top: calc(82px + var(--safe-top));
  align-self: start;
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(0,0,0,.09);
  border-radius: 24px;
  padding: 9px;
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(14px);
}
.nav-item {
  width: 100%;
  border: 0;
  background: transparent;
  color: #2b2b2a;
  text-align: left;
  border-radius: 16px;
  padding: 12px 13px;
  font-weight: 850;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-item::before {
  content: '';
  width: 7px; height: 7px;
  border: 1.5px solid currentColor;
  border-radius: 999px;
  opacity: .52;
}
.nav-item.active, .nav-item:hover { background: #111; color: #fff; }
.nav-item.active::before { background: currentColor; opacity: 1; }
.content { min-width: 0; padding-bottom: calc(76px + var(--safe-bottom)); }

.view-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}
.view-head h2 {
  font-size: clamp(27px, 3.2vw, 40px);
  font-weight: 950;
  letter-spacing: -.045em;
}
.view-head .muted { margin-top: 6px; }
.actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
.card {
  background: rgba(255,255,255,.84);
  border: 1px solid rgba(0,0,0,.085);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(10px);
}
.card.span-12 { grid-column: span 12; }
.card.span-8 { grid-column: span 8; }
.card.span-6 { grid-column: span 6; }
.card.span-4 { grid-column: span 4; }
.card.span-3 { grid-column: span 3; }
.card h3 { margin-bottom: 10px; font-size: 17px; font-weight: 950; }
.stat { font-size: clamp(30px, 4vw, 44px); font-weight: 950; line-height: .95; margin: 10px 0 6px; letter-spacing: -.05em; }
.list { display: grid; gap: 11px; }
.item {
  position: relative;
  border: 1px solid rgba(0,0,0,.085);
  border-radius: 18px;
  background: rgba(255,255,255,.92);
  padding: 14px;
  transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  overflow: hidden;
}
.item::before {
  content: '';
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  background: #111;
  opacity: .08;
}
.item:hover { transform: translateY(-1px); box-shadow: 0 14px 34px rgba(0,0,0,.075); border-color: rgba(0,0,0,.18); }
.item-head { display: flex; gap: 12px; align-items: flex-start; justify-content: space-between; }
.item-title { font-weight: 950; font-size: 16px; margin: 0 0 3px; letter-spacing: -.02em; }
.item-sub { color: var(--muted); margin: 0; font-size: 13px; }
.item-body { margin: 9px 0 0; color: #343331; white-space: pre-wrap; }
.empty {
  border: 1px dashed #c5c1ba;
  border-radius: 22px;
  padding: 34px 18px;
  text-align: center;
  color: var(--muted);
  background: rgba(255,255,255,.52);
}
.tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border: 1px solid rgba(0,0,0,.16);
  color: #111;
  background: rgba(255,255,255,.92);
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 850;
  box-shadow: none;
}
.tag:hover { background: #111; color: #fff; transform: translateY(-1px); }
.tag.soft { border-color: var(--line); background: #f7f7f5; color: #4b4946; }
.badge {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 4px 9px;
  font-size: 11px;
  font-weight: 900;
  background: #111;
  color: #fff;
}
.badge.light { background: #f1f1ef; color: #111; border: 1px solid var(--line); }
.badge.warn { background: #fff0cc; color: #6a4700; }
.badge.danger { background: #ffe3e3; color: var(--danger); }

.form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 13px; }
.form-grid .full { grid-column: 1 / -1; }
.check-row { display: flex; flex-direction: row; align-items: center; gap: 10px; font-weight: 850; }
.check-row input { width: auto; }
label { display: grid; gap: 6px; font-weight: 850; font-size: 13px; }
.help { color: var(--muted); font-size: 12px; font-weight: 400; }
.segmented {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 4px;
  border: 1px solid rgba(0,0,0,.10);
  border-radius: 999px;
  background: #f7f7f5;
}
.segmented button {
  border: 0;
  background: transparent;
  border-radius: 999px;
  padding: 7px 11px;
  font-weight: 850;
  color: #3a3937;
}
.segmented button.active { background: #111; color: #fff; box-shadow: 0 8px 16px rgba(0,0,0,.12); }

.tabs {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  gap: 8px;
  margin-bottom: 16px;
  padding: 2px 0 8px;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  border: 1px solid rgba(0,0,0,.10);
  background: rgba(255,255,255,.86);
  color: #111;
  padding: 10px 14px;
  border-radius: 999px;
  font-weight: 900;
}
.tab.active { background: #111; color: #fff; border-color: #111; }
.toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; align-items: center; }
.searchbar { display: flex; gap: 9px; align-items: center; }
.searchbar input { min-width: min(460px, 100%); }
.search-result-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 14px 0 10px; }
.search-excerpt { margin: 8px 0 0; color: #343230; line-height: 1.75; }
.search-excerpt mark { background: #111; color: #fff; border-radius: 6px; padding: 0 3px; }


.shelf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.shelf-card {
  position: relative;
  min-height: 210px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: linear-gradient(145deg, rgba(255,255,255,.97), rgba(246,246,244,.92));
  border: 1px solid rgba(0,0,0,.09);
  border-radius: 24px;
  padding: 18px;
  box-shadow: var(--shadow-soft);
  overflow: hidden;
}
.shelf-card::after {
  content: '';
  position: absolute;
  inset: auto 18px 0 18px;
  height: 5px;
  border-radius: 999px 999px 0 0;
  background: #111;
  opacity: .10;
}
.shelf-card:hover { transform: translateY(-2px); box-shadow: 0 18px 42px rgba(0,0,0,.09); }
.shelf-kicker { color: var(--muted); font-size: 11px; font-weight: 900; letter-spacing: .13em; text-transform: uppercase; margin: 0 0 8px; }
.shelf-title { font-size: 20px; font-weight: 950; letter-spacing: -.04em; line-height: 1.28; margin: 0; }
.shelf-desc { color: #3c3a36; margin: 10px 0 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.shelf-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; color: var(--muted); font-size: 12px; font-weight: 800; }
.shelf-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
.shelf-actions.single { grid-template-columns: 1fr; }
.reader-nav-card { margin-top: 14px; }
.reader-nav-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
.reader-nav-center { text-align: center; color: var(--muted); font-weight: 850; font-size: 13px; }
.reader-branch-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
.reader-branch-list .primary, .reader-branch-list .ghost { max-width: 100%; }
.reader-alt-routes { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
.reader-page-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
.reader-page-head .actions { width: auto; }
.reader-settings-panel {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transform: translateY(-6px);
  transition: max-height .24s ease, opacity .18s ease, transform .18s ease, margin .18s ease;
  margin: 0;
}
.reader-settings-panel.open { max-height: 360px; opacity: 1; transform: translateY(0); margin: 10px 0 14px; }
.reader-settings-box {
  border: 1px solid rgba(0,0,0,.09);
  border-radius: 20px;
  background: rgba(255,255,255,.88);
  padding: 12px;
}
.reader-setting-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 6px 0; }
.reader-setting-label { min-width: 72px; color: var(--muted); font-size: 12px; font-weight: 900; }
.reader-setting-range { display: grid; gap: 4px; min-width: min(260px, 100%); flex: 1 1 190px; }
.reader-minimal-card { padding: clamp(14px, 2.2vw, 20px); }

.route-list { display: grid; gap: 9px; }
.route-pill {
  width: 100%;
  text-align: left;
  border: 1px solid rgba(0,0,0,.10);
  border-radius: 17px;
  background: rgba(255,255,255,.92);
  padding: 11px;
  transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
}
.route-pill:hover { transform: translateY(-1px); border-color: rgba(0,0,0,.20); }
.route-pill.active { border-color: #111; box-shadow: inset 0 0 0 1px #111, 0 12px 28px rgba(0,0,0,.06); }
.page-list { display: grid; gap: 9px; }
.page-row {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  text-align: left;
  border: 1px solid rgba(0,0,0,.10);
  border-radius: 17px;
  background: rgba(255,255,255,.92);
  padding: 10px;
  cursor: pointer;
  transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
}
.page-row:hover { transform: translateY(-1px); border-color: rgba(0,0,0,.20); }
.page-row.active { border-color: #111; box-shadow: inset 0 0 0 1px #111, 0 12px 28px rgba(0,0,0,.06); }
.page-row-title { font-weight: 950; line-height: 1.35; margin-top: 5px; overflow-wrap: anywhere; }
.page-row-meta { color: var(--muted); font-size: 12px; font-weight: 800; margin-top: 2px; }
.page-row-actions { display: flex; flex-direction: column; gap: 5px; }
.page-row-actions button { padding: 6px 8px; min-width: 34px; }
.editor-layout { display: grid; grid-template-columns: 292px minmax(0, 1fr); gap: 16px; }
.editor-textarea {
  min-height: 58vh;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
  line-height: 1.95;
  font-size: 16px;
  border-radius: 22px;
  padding: 18px;
  background: #fffdf9;
}

.reader {
  min-height: 72vh;
  border-radius: 26px;
  border: 1px solid rgba(0,0,0,.10);
  background: #fff;
  padding: clamp(22px, 4vw, 48px);
  overflow: auto;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.65), 0 18px 52px rgba(0,0,0,.08);
  scroll-behavior: smooth;
}
.reader.ecru { background: #f8f0e3; color: #1a1712; border-color: #e5d9ca; }
.reader.dark { background: #111; color: #eeeeee; border-color: #222; box-shadow: 0 18px 52px rgba(0,0,0,.18); }
.reader.gothic { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Meiryo", sans-serif; }
.reader.mincho { font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif; }
.reader.vertical {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  max-height: 76vh;
  padding: clamp(22px, 4vw, 44px);
}
.reader.horizontal { writing-mode: horizontal-tb; }
.reader-text { white-space: pre-wrap; margin: 0; letter-spacing: .02em; }
 .reader.dark .reader-text { color: #efefef; }
.reader-end-nav { display: none; }
.reader-end-nav-title { color: var(--muted); font-weight: 850; font-size: .78em; margin: 0 0 1em; }
.reader-end-nav-buttons { display: flex; gap: .8em; align-items: flex-start; flex-wrap: wrap; }
.reader.vertical .reader-end-nav {
  display: inline-flex;
  flex-direction: column;
  gap: 1.1em;
  margin-block-start: 2.4em;
  padding: 1em .8em;
  border-inline-start: 1px solid rgba(0,0,0,.14);
  background: rgba(255,255,255,.55);
  border-radius: 18px;
  min-height: 12em;
}
.reader.vertical.dark .reader-end-nav { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.18); }
.reader.vertical .reader-end-nav button {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  min-inline-size: 8em;
  min-block-size: 2.7em;
  padding: 1em .75em;
  white-space: nowrap;
}

.modal {
  width: min(660px, calc(100% - 24px));
  border: 0;
  border-radius: 28px;
  padding: 0;
  box-shadow: 0 30px 100px rgba(0,0,0,.26);
  background: #fff;
}
.modal::backdrop { background: rgba(0,0,0,.42); backdrop-filter: blur(6px); }
.modal-card { padding: 0; margin: 0; }
.modal-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 20px 20px 0; }
#modalBody { padding: 15px 20px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 0 20px 20px; flex-wrap: wrap; }
.toast {
  position: fixed;
  left: 50%; bottom: calc(18px + var(--safe-bottom));
  transform: translate(-50%, 20px);
  background: #111; color: #fff;
  border-radius: 999px;
  padding: 11px 17px;
  opacity: 0;
  pointer-events: none;
  transition: .2s ease;
  z-index: 50;
  max-width: calc(100% - 24px);
  box-shadow: 0 16px 40px rgba(0,0,0,.20);
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }

.codebox {
  width: 100%;
  min-height: 210px;
  border-radius: 18px;
  background: #111;
  color: #fff;
  padding: 14px;
  overflow: auto;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
}
.file-input { padding: 12px; border: 1px dashed var(--line-strong); border-radius: 16px; background:#fafafa; }


/* Reader full-screen mode: reading view uses almost the whole device screen. */
.main-app.reader-mode .topbar { display: none; }
.main-app.reader-mode .layout {
  width: 100%;
  max-width: none;
  grid-template-columns: minmax(0, 1fr);
  gap: 0;
  padding: 0;
}
.main-app.reader-mode .side-nav { display: none !important; }
.main-app.reader-mode .content {
  min-height: 100vh;
  min-height: 100dvh;
  padding: 0;
}
.reader-screen {
  width: 100%;
  max-width: 100vw;
  min-width: 0;
  min-height: 100vh;
  min-height: 100dvh;
  height: 100vh;
  height: 100dvh;

  <script>
(() => {

  // ===== クラウド同期設定 =====
  // Firebase コンソールの「Config」に出る firebaseConfig を下に貼ってください。
  // ここは Firebase と同じ名前の firebaseConfig でOKです。

  const firebaseConfig = {
  apiKey: "AIzaSyCwwAoxcRQbbbtGl0ow_OM2AnSQAD-mZuk",
  authDomain: "my-private-library-d44cf.firebaseapp.com",
  projectId: "my-private-library-d44cf",
  storageBucket: "my-private-library-d44cf.firebasestorage.app",
  messagingSenderId: "1061524139746",
  appId: "1:1061524139746:web:0dbebed247398cf7f5f8bb"
};
  const FIREBASE_CONFIG = firebaseConfig;

  const CLOUD_DOC_ID = 'default';
  const CLOUD_AUTOSYNC_MS = 5000;

  const $ = (selector, root = document) => root.querySelector(selector);
  const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
  const nowISO = () => new Date().toISOString();
  const todayKey = () => new Date().toISOString().slice(0, 10);
  const uid = (prefix = 'id') => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 9)}`;
  const escapeHTML = (value = '') => String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');

  let db = null;
  let state = null;
  let sessionKey = null;
  let current = { view: 'home', seriesId: null, entryId: null, routeId: null, tab: 'stories' };
  let autosaveTimer = null;
  let toastTimer = null;
  let cloudAutoTimer = null;
  let firebaseApp = null;
  let cloudAuth = null;
  let cloudDb = null;
  let cloudUser = null;
  let cloudInitPromise = null;
  let cloudBusy = false;
  let cloudMessage = '';

  const app = $('#app');
  const lockScreen = $('#lockScreen');
  const mainApp = $('#mainApp');
  const content = $('#content');
  const pageTitle = $('#pageTitle');
  const modal = $('#modal');
  const modalTitle = $('#modalTitle');
  const modalBody = $('#modalBody');
  const modalActions = $('#modalActions');
  const toast = $('#toast');

  const routeTypeLabels = {
    main: '本編',
    if: 'IF',
    candidate: '採用候補',
    rewrite: '書き直し版',
    rejected: '没案'
  };
  const statusLabels = {
    draft: '下書き',
    writing: '執筆中',
    complete: '完成',
    hold: '保留',
    rejected: '没'
  };

  function createInitialState() {
    return {
      appVersion: 1,
      createdAt: nowISO(),
      updatedAt: nowISO(),
      settings: {
        readerMode: 'horizontal',
        readerFont: 'mincho',
        readerTheme: 'light',
        fontSize: 18,
        lineHeight: 1.9,
        contentWidth: 760,
        lockOnHide: true,
        cloudAutoSync: false
      },
      series: [],
      ideas: [],
      trash: [],
      lastRead: null,
      writingLog: {}
    };
  }

  function localDBKey(key) {
    return `${DB_NAME}_${STORE_NAME}_${key}`;
  }

  function openDB() {
    if (!('indexedDB' in window)) return Promise.resolve({ localFallback: true });
    return new Promise((resolve) => {
      try {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) database.createObjectStore(STORE_NAME);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => resolve({ localFallback: true });
        request.onblocked = () => resolve({ localFallback: true });
      } catch (error) {
        resolve({ localFallback: true });
      }
    });
  }

  function dbGet(key) {
    if (db?.localFallback) {
      return Promise.resolve(JSON.parse(localStorage.getItem(localDBKey(key)) || 'null'));
    }
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.get(key);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  function dbSet(key, value) {
    if (db?.localFallback) {
      localStorage.setItem(localDBKey(key), JSON.stringify(value));
      return Promise.resolve();
    }
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const request = store.put(value, key);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  function dbDelete(key) {
    if (db?.localFallback) {
      localStorage.removeItem(localDBKey(key));
      return Promise.resolve();
    }
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const request = store.delete(key);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  function isFirebaseConfigured() {
    return Boolean(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.authDomain && FIREBASE_CONFIG.projectId && FIREBASE_CONFIG.appId);
  }

  function cloudStatusText() {
    if (!isFirebaseConfigured()) return '未設定（Firebase設定を貼ると同期できます）';
    if (!window.navigator.onLine) return 'オフライン';
    if (!cloudAuth || !cloudDb) return '未接続';
    if (!cloudUser) return '未ログイン';
    return `ログイン中：${cloudUser.email || 'アカウント'}`;
  }

  function loadScript(src) {
    if ($(`script[src="${src}"]`)) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = resolve;
      script.onerror = () => reject(new Error('Firebaseライブラリを読み込めませんでした。ネット接続を確認してください。'));
      document.head.appendChild(script);
    });
  }

  async function ensureFirebase() {
    if (!isFirebaseConfigured()) throw new Error('Firebase設定が未入力です。index.html内の firebaseConfig を確認してください。');
    if (cloudInitPromise) return cloudInitPromise;
    cloudInitPromise = (async () => {
      if (!window.firebase?.apps) {
        const version = '10.12.5';
        await loadScript(`https://www.gstatic.com/firebasejs/${version}/firebase-app-compat.js`);
        await loadScript(`https://www.gstatic.com/firebasejs/${version}/firebase-auth-compat.js`);
        await loadScript(`https://www.gstatic.com/firebasejs/${version}/firebase-firestore-compat.js`);
      }
      if (!firebaseApp) {
        firebaseApp = window.firebase.apps.length ? window.firebase.app() : window.firebase.initializeApp(FIREBASE_CONFIG);
        cloudAuth = window.firebase.auth();
        cloudDb = window.firebase.firestore();
        try {
          await cloudDb.enablePersistence({ synchronizeTabs: true });
        } catch (error) {
          console.warn('Firestore offline persistence was not enabled.', error);
        }
        cloudAuth.onAuthStateChanged((user) => {
          cloudUser = user;
          if (current.view === 'settings') renderSettings();
        });
      }
      return { auth: cloudAuth, db: cloudDb };
    })();
    return cloudInitPromise;
  }

  async function getCurrentCloudUser() {
    const { auth } = await ensureFirebase();
    if (auth.currentUser) {
      cloudUser = auth.currentUser;
      return cloudUser;
    }
    throw new Error('クラウド同期にはログインが必要です。');
  }

  function cloudDocRef(uidValue) {
    return cloudDb.collection('users').doc(uidValue).collection('archives').doc(CLOUD_DOC_ID);
  }

  async function getLocalEncryptedBundle() {
    await saveEncryptedState(true, { skipCloud: true });
    const meta = JSON.parse(localStorage.getItem(META_KEY) || 'null');
    const encrypted = await dbGet(STATE_KEY);
    if (!meta || !encrypted) throw new Error('端末内データが見つかりません。');
    return { meta, encrypted, stateUpdatedAt: state?.updatedAt || nowISO(), appVersion: state?.appVersion || 1 };

    if (!state?.settings?.cloudAutoSync || !cloudUser || cloudBusy || !isFirebaseConfigured()) return;

  async function cloudSignIn(email, password, create = false) {
    const { auth } = await ensureFirebase();
    if (!email || !password) throw new Error('メールアドレスとパスワードを入力してください。');
    const result = create
      ? await auth.createUserWithEmailAndPassword(email, password)
      : await auth.signInWithEmailAndPassword(email, password);
    cloudUser = result.user;
    cloudMessage = create ? 'クラウドアカウントを作成しました。' : 'ログインしました。';
    return cloudUser;
  }

  async function cloudSignOut() {
    const { auth } = await ensureFirebase();
    await auth.signOut();
    cloudUser = null;
    cloudMessage = 'ログアウトしました。';
  }

  async function uploadCloudData(options = {}) {
    if (cloudBusy) return;
    cloudBusy = true;
    try {
      const user = await getCurrentCloudUser();
      const bundle = await getLocalEncryptedBundle();
      await cloudDocRef(user.uid).set({
        ...bundle,
        cloudUpdatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      cloudMessage = 'クラウドへ保存しました。';
      if (!options.silent) toastMessage(cloudMessage);
    } finally {
      cloudBusy = false;
      if (current.view === 'settings') renderSettings();
    }
  }

  async function fetchCloudBundle() {
    const user = await getCurrentCloudUser();
    const snap = await cloudDocRef(user.uid).get();
    if (!snap.exists) throw new Error('クラウド側に保存データがありません。先にこの端末から保存してください。');
    return snap.data();
  }

  async function decryptCloudBundle(bundle) {
    const remoteMeta = bundle?.meta;
    const encrypted = bundle?.encrypted;
    if (!remoteMeta?.salt || !encrypted?.iv || !encrypted?.cipher) throw new Error('クラウドデータの形式が正しくありません。');
    const localMeta = JSON.parse(localStorage.getItem(META_KEY) || 'null');
    let key = sessionKey;
    try {
      if (!localMeta || localMeta.salt !== remoteMeta.salt) throw new Error('passcode-needed');
      return { key, data: JSON.parse(await decryptText(key, encrypted)), meta: remoteMeta, encrypted };
    } catch (error) {
      const pass = window.prompt('クラウド保存時に使っていたアプリのパスコードを入力してください。');
      if (!pass) throw new Error('クラウド復元をキャンセルしました。');
      key = await deriveKey(pass, remoteMeta.salt);
      return { key, data: JSON.parse(await decryptText(key, encrypted)), meta: remoteMeta, encrypted };
    }
  }

  async function downloadCloudData() {
    if (cloudBusy) return;
    const ok = await confirmDialog('クラウドから取得しますか？', 'この端末内の現在の小説データを、クラウド側のデータで置き換えます。必要なら先にバックアップを作成してください。');
    if (!ok) return;
    cloudBusy = true;
    try {
      const bundle = await fetchCloudBundle();
      const result = await decryptCloudBundle(bundle);
      localStorage.setItem(META_KEY, JSON.stringify(result.meta));
      sessionKey = result.key;
      state = result.data;
      await dbSet(STATE_KEY, result.encrypted);
      cloudMessage = 'クラウドから取得しました。';
      toastMessage(cloudMessage);
      navigate('home');
    } finally {
      cloudBusy = false;
      if (current.view === 'settings') renderSettings();
    }
  }

  function bytesToB64(bytes) {
    let binary = '';
    const arr = new Uint8Array(bytes);
    for (let i = 0; i < arr.length; i += 1) binary += String.fromCharCode(arr[i]);
    return btoa(binary);
  }

  function b64ToBytes(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(passcode, saltB64) {
    if (!crypto.subtle) throw new Error('このブラウザではロック機能を使えません。');
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passcode), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64ToBytes(saltB64), iterations: 150000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encryptText(key, text) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const data = new TextEncoder().encode(text);
    const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
    return { iv: bytesToB64(iv), cipher: bytesToB64(cipher) };
  }

  async function decryptText(key, payload) {
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(payload.iv) }, key, b64ToBytes(payload.cipher));
    return new TextDecoder().decode(plain);
  }

  async function saveEncryptedState(immediate = false, options = {}) {
    if (!state || !sessionKey) return;
    state.updatedAt = nowISO();
    const work = async () => {
      const encrypted = await encryptText(sessionKey, JSON.stringify(state));
      await dbSet(STATE_KEY, encrypted);
      if (!options.skipCloud) scheduleCloudUpload();
    };
    if (immediate) {
      clearTimeout(autosaveTimer);
      await work();
      return;
    }
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => work().catch(console.error), AUTO_SAVE_MS);
  }

  async function setupPasscode(passcode) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const saltB64 = bytesToB64(salt);
    const key = await deriveKey(passcode, saltB64);
    const verifier = await encryptText(key, VERIFIER_TEXT);
    localStorage.setItem(META_KEY, JSON.stringify({ salt: saltB64, verifier, createdAt: nowISO() }));
    sessionKey = key;
    state = createInitialState();
    await saveEncryptedState(true);
  }

  async function unlock(passcode) {
    const meta = JSON.parse(localStorage.getItem(META_KEY) || 'null');
    if (!meta) throw new Error('パスコードが未設定です。');
    const key = await deriveKey(passcode, meta.salt);
    const verified = await decryptText(key, meta.verifier);
    if (verified !== VERIFIER_TEXT) throw new Error('パスコードが違います。');
    sessionKey = key;
    const encrypted = await dbGet(STATE_KEY);
    if (encrypted) {
      state = JSON.parse(await decryptText(key, encrypted));
    } else {
      state = createInitialState();
      await saveEncryptedState(true);
    }
  }

  function hasPasscode() {
    return Boolean(localStorage.getItem(META_KEY));
  }

  async function resetAllData() {

  function parseTags(value = '') {

  function tagsToInput(tags = []) {

  function renderTags(tags = [], soft = false) {

  function charCountText(text = '') {
    return String(text).replace(/\s/g, '').length;
  }

  function makePage(title = '1ページ', body = '', order = 0) {
    return {
      id: uid('page'),
      title,
      body,
      order,
      createdAt: nowISO(),
      updatedAt: nowISO()

  function normalizeRoutePages(route) {
    if (!route) return [];
    if (!Array.isArray(route.pages) || route.pages.length === 0) {
      route.pages = [makePage('1ページ', route.body || '', 0)];
    }
    route.pages.forEach((page, index) => {
      if (!page.id) page.id = uid('page');
      if (!page.title) page.title = `${index + 1}ページ`;
      if (typeof page.body !== 'string') page.body = '';
      if (typeof page.order !== 'number') page.order = index;
      if (!page.createdAt) page.createdAt = route.createdAt || nowISO();
      if (!page.updatedAt) page.updatedAt = route.updatedAt || nowISO();
    });
    route.pages.sort((a, b) => (a.order || 0) - (b.order || 0) || compareDate(a.createdAt, b.createdAt));
    route.pages.forEach((page, index) => (page.order = index));
    route.body = route.pages.map((page) => page.body || '').join('\n\n');
    return route.pages;
  }

  function routeBody(route) {
    return normalizeRoutePages(route).map((page) => page.body || '').join('\n\n');
  }

  function routeChars(route) {
    return charCountText(routeBody(route));
  }

  function cloneRoutePages(route) {
    return normalizeRoutePages(route).map((page, index) => ({
      ...page,
      id: uid('page'),
      order: index,
      createdAt: nowISO(),
      updatedAt: nowISO()
    }));
  }

  function formatDate(iso) {
    if (!iso) return '-';
    const date = new Date(iso);
    if (Number.isNaN(date.getTime())) return '-';
    return date.toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  }

  function getSeries(seriesId) {
    return state.series.find((item) => item.id === seriesId) || null;
  }

  function getEntry(seriesId, entryId) {
    const series = getSeries(seriesId);
    return series?.entries.find((item) => item.id === entryId) || null;
  }

  function getRoute(seriesId, entryId, routeId) {
    const entry = getEntry(seriesId, entryId);
    return entry?.routes.find((item) => item.id === routeId) || null;
  }

  function allEntries() {
    const list = [];
    state.series.forEach((series) => {
      series.entries.forEach((entry) => {
        entry.routes.forEach((route) => list.push({ series, entry, route }));
      });
    });
    return list;
  }

  function getSeriesTags(series) {
    const tags = new Set(series.tags || []);
    series.entries.forEach((entry) => {
      (entry.tags || []).forEach((tag) => tags.add(tag));
      entry.routes.forEach((route) => (route.tags || []).forEach((tag) => tags.add(tag)));
    });
    return Array.from(tags);
  }



  const routeTypePriority = { main: 0, if: 1, candidate: 2, rewrite: 3, rejected: 4 };

  function normalizeDigits(value = '') {
    return String(value).replace(/[０-９]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
  }

  function routePriority(route) {
    return routeTypePriority[route?.type] ?? 9;
  }

  function entryMainPriority(entry) {
    return Math.min(...(entry?.routes || []).map(routePriority), 9);
  }

  function episodeKey(entry) {
    const normalized = normalizeDigits(entry?.title || '')
      .toLowerCase()
      .replace(/\s+/g, '')
      .replace(/[＿_\-―ー～〜:：/／|｜（）()\[\]【】「」『』]/g, '');
    const numbered = normalized.match(/(?:第)?(\d+)(?:話|wa|episode|ep)/i);
    if (numbered) return `${entry?.chapterId || ''}::episode-${Number(numbered[1])}`;
    const stripped = normalized.replace(/本編|if|ｉｆ|ルート|別ルート|採用候補|書き直し版?|没案|下書き|完成/g, '');
    return `${entry?.chapterId || ''}::${stripped || normalized || entry?.id}`;
  }

  function compareDate(a, b) {
    return new Date(a || 0) - new Date(b || 0);
  }

  function compareEntries(a, b) {
    const aKey = episodeKey(a);
    const bKey = episodeKey(b);
    if (aKey === bKey) {
      return entryMainPriority(a) - entryMainPriority(b)
        || (a.order || 0) - (b.order || 0)
        || compareDate(a.createdAt, b.createdAt);
    }
    return (a.order || 0) - (b.order || 0) || compareDate(a.createdAt, b.createdAt);
  }

  function compareRoutes(a, b) {
    return routePriority(a) - routePriority(b) || compareDate(a.createdAt, b.createdAt);
  }

  function orderedEntries(series) {
    if (!series) return [];
    const chapters = [{ id: '', order: -1 }, ...(series.chapters || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0))];
    const result = [];
    chapters.forEach((chapter) => {
      series.entries
        .filter((entry) => (entry.chapterId || '') === chapter.id)
        .slice()
        .sort(compareEntries)
        .forEach((entry) => result.push(entry));
    });
    series.entries
      .filter((entry) => !result.some((item) => item.id === entry.id))
      .slice()
      .sort(compareEntries)
      .forEach((entry) => result.push(entry));
    return result;
  }

  function orderedEpisodeGroups(series) {
    const groups = [];
    orderedEntries(series).forEach((entry) => {
      const key = episodeKey(entry);
      let group = groups.find((item) => item.key === key);
      if (!group) {
        group = {
          key,
          title: entry.title,
          chapterId: entry.chapterId || '',
          order: entry.order || 0,
          firstCreatedAt: entry.createdAt || '',
          entries: [],
          targets: []
        };
        groups.push(group);
      }
      group.entries.push(entry);
      (entry.routes || []).forEach((route) => group.targets.push({ series, entry, route }));
      const mainEntry = group.entries.find((item) => (item.routes || []).some((route) => route.type === 'main'));
      if (mainEntry) group.title = mainEntry.title;
    });
    groups.forEach((group) => group.targets.sort((a, b) => compareRoutes(a.route, b.route) || compareDate(a.entry.createdAt, b.entry.createdAt)));
    return groups;
  }

  function findEpisodeGroup(series, entry) {
    return orderedEpisodeGroups(series).find((group) => group.entries.some((item) => item.id === entry?.id)) || null;
  }

  function primaryTargetOfGroup(group) {
    return group?.targets?.find(({ route }) => route.type === 'main') || group?.targets?.[0] || null;
  }

  function mainRouteOf(entry) {
    const routes = (entry?.routes || []).slice().sort(compareRoutes);
    return routes.find((route) => route.type === 'main') || routes[0] || null;
  }

  function getFirstReadable(series) {
    return primaryTargetOfGroup(orderedEpisodeGroups(series)[0]);
  }

  function getSeriesContinue(series) {
    const routes = [];
    orderedEpisodeGroups(series).forEach((group) => group.targets.forEach((target) => routes.push(target)));
    const last = routes
      .filter(({ route }) => route.read?.updatedAt)
      .sort((a, b) => new Date(b.route.read.updatedAt) - new Date(a.route.read.updatedAt))[0];
    if (last) return last;
    return getFirstReadable(series);
  }

  function getPrevEntryTarget(series, entry) {
    const groups = orderedEpisodeGroups(series);
    const index = groups.findIndex((group) => group.entries.some((item) => item.id === entry?.id));
    if (index <= 0) return null;
    return primaryTargetOfGroup(groups[index - 1]);
  }

  function getNextEntryTargets(series, entry) {
    const groups = orderedEpisodeGroups(series);
    const index = groups.findIndex((group) => group.entries.some((item) => item.id === entry?.id));
    if (index < 0 || index >= groups.length - 1) return [];
    return groups[index + 1].targets.slice().sort((a, b) => compareRoutes(a.route, b.route));
  }

  function navigate(view, params = {}) {
    const next = { ...current, view, ...params };
    if (view !== 'reader' && view !== 'editor') {
      delete next.pageIndex;
    }
    if (view !== 'reader') {
      delete next.pendingReaderPosition;
    }
    if (view === 'reader' && !Object.prototype.hasOwnProperty.call(params, 'pageIndex')) {
      const targetRoute = getRoute(next.seriesId, next.entryId, next.routeId);
      next.pageIndex = targetRoute?.read?.pageIndex ?? 0;
    }
    if (view === 'editor' && !Object.prototype.hasOwnProperty.call(params, 'pageIndex')) {
      next.pageIndex = 0;
    }
    current = next;
    $$('.nav-item').forEach((button) => button.classList.toggle('active', button.dataset.view === view));
    $('#sideNav').classList.remove('open');
    render();
    setTimeout(() => content.focus(), 0);
  }

    if (view === 'hidden') return renderSeriesList(true);
    if (view === 'seriesDetail') return renderSeriesDetail(current.seriesId, current.tab || 'stories');
    if (view === 'editor') return renderEditor(current.seriesId, current.entryId, current.routeId);
    if (view === 'reader') return renderReader(current.seriesId, current.entryId, current.routeId);
    if (view === 'ideas') return renderIdeas();
    if (view === 'tags') return renderTagView();
    if (view === 'search') return renderSearch();
    if (view === 'trash') return renderTrash();
    if (view === 'backup') return renderBackup();

  }


  function renderReadingShelf() {
    setTitle('読む');
    const list = state.series
      .filter((series) => !series.hidden && series.entries.length)
      .sort((a, b) => Number(Boolean(b.favorite)) - Number(Boolean(a.favorite)) || new Date(b.updatedAt) - new Date(a.updatedAt));
    content.innerHTML = `
      <div class="view-head">
        <div>
          <h2>読む</h2>
          <p class="muted">シリーズものはシリーズタイトル、単発ものは単発タイトルで一覧表示します。</p>
        </div>
        <div class="actions">
          <button class="primary" data-action="new-series">作品を追加</button>
        </div>
      </div>
      ${list.length ? `<div class="shelf-grid">${list.map(renderReadingShelfCard).join('')}</div>` : '<div class="empty">まだ読める作品がありません。シリーズから話を追加してください。</div>'}
    `;
    content.onclick = (event) => {
      const target = event.target.closest('button');
      if (!target) return;
      if (target.dataset.action === 'new-series') return openSeriesModal();
      const series = getSeries(target.dataset.series);
      if (!series) return;
      if (target.dataset.action === 'open-series') return navigate('seriesDetail', { seriesId: series.id, tab: 'stories' });
      if (target.dataset.action === 'read-first') {
        const first = getFirstReadable(series);
        if (!first) return toastMessage('読む話がありません。');
        first.route.read.position = 0;
        first.route.read.updatedAt = nowISO();
        first.route.read.pageIndex = 0;
        first.route.read.pagePosition = 0;
        state.lastRead = { seriesId: first.series.id, entryId: first.entry.id, routeId: first.route.id, pageIndex: 0, at: nowISO() };
        saveEncryptedState(true);
        return navigate('reader', { seriesId: first.series.id, entryId: first.entry.id, routeId: first.route.id, pageIndex: 0 });
      }
      if (target.dataset.action === 'read-continue') {
        const next = getSeriesContinue(series);
        if (!next) return toastMessage('読む話がありません。');
        return navigate('reader', { seriesId: next.series.id, entryId: next.entry.id, routeId: next.route.id, pageIndex: next.route.read?.pageIndex || 0 });
      }
    };
  }

  function renderReadingShelfCard(series) {
    const standalone = isStandaloneSeries(series);
    const entries = orderedEntries(series);
    const first = getFirstReadable(series);
    const cont = getSeriesContinue(series);
    const routeCount = entries.reduce((sum, entry) => sum + (entry.routes?.length || 0), 0);
    const chars = entries.reduce((sum, entry) => sum + (entry.routes || []).reduce((s, route) => s + routeChars(route), 0), 0);
    const tags = getSeriesTags(series).slice(0, 8);
    const title = standalone && first ? first.entry.title : series.title;
    const subtitle = standalone ? '単発' : `${entries.length}話 / ${routeCount}ルート`;
    const desc = standalone ? (first ? routeBody(first.route) : series.description || first?.entry?.memo || '').slice(0, 120) : (series.description || '');
    return `
      <article class="shelf-card">
        <div>
          <p class="shelf-kicker">${standalone ? 'SINGLE' : 'SERIES'}</p>
          <h3 class="shelf-title">${series.favorite ? '★ ' : ''}${escapeHTML(title)}</h3>
          <div class="shelf-meta"><span>${subtitle}</span><span>${chars.toLocaleString()}字</span><span>更新 ${formatDate(series.updatedAt)}</span></div>
          ${desc ? `<p class="shelf-desc">${escapeHTML(desc)}</p>` : ''}
          ${renderTags(tags, true)}
        </div>
        <div class="shelf-actions ${standalone ? 'single' : ''}">

  function searchBodyInSeries(query, hiddenOnly = false) {
    const q = String(query || '').trim().toLowerCase();
    if (!q) return [];
    const results = [];
    state.series
      .filter((series) => hiddenOnly ? series.hidden : !series.hidden)
      .forEach((series) => {
        orderedEntries(series).forEach((entry) => {
          (entry.routes || []).slice().sort(compareRoutes).forEach((route) => {
            const body = String(routeBody(route) || '');
            if (body.toLowerCase().includes(q)) results.push({ series, entry, route });
          });
        });
      });
    return results.slice(0, 200);
  }

  function excerptWithHighlight(text, query) {
    const source = String(text || '');
    const q = String(query || '').trim();
    if (!q) return escapeHTML(source.slice(0, 140));
    const lower = source.toLowerCase();
    const index = lower.indexOf(q.toLowerCase());
    if (index < 0) return escapeHTML(source.slice(0, 160));
    const start = Math.max(0, index - 52);
    const end = Math.min(source.length, index + q.length + 80);
    const before = source.slice(start, index);
    const match = source.slice(index, index + q.length);
    const after = source.slice(index + q.length, end);
    return `${start > 0 ? '…' : ''}${escapeHTML(before)}<mark>${escapeHTML(match)}</mark>${escapeHTML(after)}${end < source.length ? '…' : ''}`;
  }

  function renderOptions(map, selected) {
    return Object.entries(map).map(([value, label]) => `<option value="${value}" ${value === selected ? 'selected' : ''}>${escapeHTML(label)}</option>`).join('');

  function bindEditor(series, entry, route, pageIndex = 0) {
    content.onclick = async (event) => {
      const target = event.target.closest('[data-action]');
      if (!target || !content.contains(target)) return;
      const action = target.dataset.action;
      const pages = normalizeRoutePages(route);
      if (action === 'back-detail') return navigate('seriesDetail', { seriesId: series.id, tab: 'stories' });
      if (action === 'read-current') return navigate('reader', { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex });
      if (action === 'save-now') { await saveEncryptedState(true); return toastMessage('保存しました。'); }
      if (action === 'switch-route') return navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: target.dataset.route, pageIndex: 0 });
      if (action === 'switch-page') {
        const targetPage = Number(target.dataset.page || 0);
        return navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex: Math.min(Math.max(targetPage, 0), pages.length - 1) });
      }
      if (action === 'add-page') {
        const newPage = makePage(`${pages.length + 1}ページ`, '', pages.length);
        pages.push(newPage);
        normalizeRoutePages(route);
        const newIndex = normalizeRoutePages(route).findIndex((item) => item.id === newPage.id);
        route.updatedAt = nowISO();
        entry.updatedAt = nowISO();
        touchSeries(series);
        await saveEncryptedState(true);
        return navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex: Math.max(0, newIndex) });
      }
      if (action === 'delete-page') {
        if (pages.length <= 1) return toastMessage('1ページ目は削除できません。');
        pages.splice(pageIndex, 1);
        normalizeRoutePages(route);
        route.updatedAt = nowISO();
        entry.updatedAt = nowISO();
        touchSeries(series);
        await saveEncryptedState(true);
        return navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex: Math.max(0, pageIndex - 1) });
      }
      if (action === 'move-page-up' || action === 'move-page-down') {
        const direction = action === 'move-page-up' ? -1 : 1;
        const fromIndex = Math.min(Math.max(Number(target.dataset.page ?? pageIndex), 0), pages.length - 1);
        const nextIndex = fromIndex + direction;
        if (nextIndex < 0 || nextIndex >= pages.length) return;
        [pages[fromIndex], pages[nextIndex]] = [pages[nextIndex], pages[fromIndex]];
        pages.forEach((item, index) => (item.order = index));
        normalizeRoutePages(route);
        route.updatedAt = nowISO();
        entry.updatedAt = nowISO();
        touchSeries(series);
        await saveEncryptedState(true);
        return navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex: nextIndex });
      }
      if (action === 'new-route') return openRouteModal(series, entry, route);
      if (action === 'copy-route') return copyRoute(series, entry, route);
      if (action === 'delete-route') return confirmDeleteRoute(series, entry, route);
    };
    content.oninput = (event) => {
      const target = event.target;
      const pages = normalizeRoutePages(route);
      const page = pages[pageIndex] || pages[0];
      if (target.dataset.entryField) {
        const field = target.dataset.entryField;
        entry[field] = field === 'tags' ? parseTags(target.value) : target.value;
        entry.updatedAt = nowISO();
        touchSeries(series);
        saveEncryptedState();
      }
      if (target.dataset.routeField) {
        const field = target.dataset.routeField;
        route[field] = field === 'tags' ? parseTags(target.value) : target.value;
        route.updatedAt = nowISO();
        entry.updatedAt = nowISO();
        touchSeries(series);
        saveEncryptedState();
      }
      if (target.dataset.pageField && page) {
        const field = target.dataset.pageField;
        page[field] = target.value;
        page.updatedAt = nowISO();
        route.updatedAt = nowISO();
        entry.updatedAt = nowISO();
        normalizeRoutePages(route);
        touchSeries(series);
        saveEncryptedState();
        if (field === 'body') {
          const badges = content.querySelectorAll('.toolbar .badge.light');
          if (badges[0]) badges[0].textContent = `このページ ${charCountText(target.value).toLocaleString()}字`;
          if (badges[1]) badges[1].textContent = `全文 ${routeChars(route).toLocaleString()}字`;
        }
      }
    };
  }

  function bindReader(series, entry, route, pageIndex = 0) {
    const reader = $('#readerBox', content);
    const pages = normalizeRoutePages(route);
    let scrollTimer = null;
    reader.addEventListener('scroll', () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const pagePosition = getReaderPosition(reader, state.settings.readerMode);
        route.read.pageIndex = pageIndex;
        route.read.pagePosition = pagePosition;
        route.read.position = Math.min(1, (pageIndex + pagePosition) / Math.max(1, pages.length));
        route.read.updatedAt = nowISO();
        state.lastRead = { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex, at: nowISO() };
        saveEncryptedState();
      }, 250);
    });
    content.onclick = async (event) => {
      const target = event.target.closest('button');
      if (!target) return;
      if (target.dataset.setting) {
        state.settings[target.dataset.setting] = target.dataset.value;
        current.readerSettingsOpen = true;
        await saveEncryptedState(true);
        return renderReader(series.id, entry.id, route.id);
      }
      const action = target.dataset.action;
      if (action === 'back-reading') return navigate('reading');
      if (action === 'toggle-reader-settings') {
        current.readerSettingsOpen = !current.readerSettingsOpen;
        return renderReader(series.id, entry.id, route.id);
      }
      if (action === 'go-page') {
        const targetPage = Number(target.dataset.page || 0);
        route.read.pageIndex = Math.min(Math.max(targetPage, 0), Math.max(0, pages.length - 1));
        route.read.pagePosition = 0;
        route.read.position = Math.min(1, route.read.pageIndex / Math.max(1, pages.length));
        route.read.updatedAt = nowISO();
        state.lastRead = { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex: route.read.pageIndex, at: nowISO() };
        saveEncryptedState();
        return navigate('reader', { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex: route.read.pageIndex, pendingReaderPosition: 0 });
      }
      if (action === 'go-route' || action === 'jump-route') return navigate('reader', { seriesId: target.dataset.series || series.id, entryId: target.dataset.entry, routeId: target.dataset.route, pageIndex: Number(target.dataset.page || 0), readerSettingsOpen: false, pendingReaderPosition: 0 });
      if (action === 'bookmark') {
        route.bookmarks.push({ id: uid('bookmark'), pageIndex, position: getReaderPosition(reader, state.settings.readerMode), createdAt: nowISO() });
        route.read.updatedAt = nowISO();
        await saveEncryptedState(true);
        toastMessage('しおりを保存しました。');
        return renderReader(series.id, entry.id, route.id);
      }
      if (action === 'mark-read') {
        route.read.completed = true;
        route.read.pageIndex = Math.max(0, pages.length - 1);
        route.read.pagePosition = 1;
        route.read.position = 1;
        route.read.updatedAt = nowISO();
        entry.readDone = true;
        state.lastRead = { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex: Math.max(0, pages.length - 1), at: nowISO() };
        await saveEncryptedState(true);
        toastMessage('読了にしました。');
        current.readerSettingsOpen = true;
        return renderReader(series.id, entry.id, route.id);
      }
      if (action === 'favorite-scene') {
        const selection = String(window.getSelection?.() || '').trim();
        if (!selection) return toastMessage('保存したい本文を選択してください。');
        route.favoriteScenes.push({ id: uid('scene'), pageIndex, quote: selection.slice(0, 800), createdAt: nowISO() });
        await saveEncryptedState(true);
        toastMessage('お気に入りシーンに保存しました。');
        current.readerSettingsOpen = true;
        return renderReader(series.id, entry.id, route.id);
      }
      if (action === 'jump-bookmark') {
        const bookmarkPage = Number(target.dataset.page || 0);
        const position = Number(target.dataset.position || 0);
        if (bookmarkPage !== pageIndex) return navigate('reader', { seriesId: series.id, entryId: entry.id, routeId: route.id, pageIndex: bookmarkPage, pendingReaderPosition: position });
        setReaderPosition(reader, position, state.settings.readerMode);
      }
    };
    content.oninput = async (event) => {
      const target = event.target;
      if (target.dataset.range) {
        state.settings[target.dataset.range] = Number(target.value);
        current.readerSettingsOpen = true;
        await saveEncryptedState(true);
        renderReader(series.id, entry.id, route.id);
      }
    };
  }

  function getReaderPosition(el, mode) {
    if (mode === 'vertical') {
      const max = Math.max(1, el.scrollWidth - el.clientWidth);
      return Math.min(1, Math.max(0, Math.abs(el.scrollLeft) / max));
    }
    const max = Math.max(1, el.scrollHeight - el.clientHeight);
    return Math.min(1, Math.max(0, el.scrollTop / max));
  }

  function setReaderPosition(el, position, mode) {
    if (mode === 'vertical') {
      const max = Math.max(1, el.scrollWidth - el.clientWidth);
      el.scrollLeft = -Math.round(max * position);
    } else {
      const max = Math.max(1, el.scrollHeight - el.clientHeight);
      el.scrollTop = Math.round(max * position);
    }
  }

  function restoreReaderPosition(route, pageIndex = 0) {
    setTimeout(() => {
      const reader = $('#readerBox', content);
      if (!reader) return;
      const pending = Number.isFinite(Number(current.pendingReaderPosition)) ? Number(current.pendingReaderPosition) : null;
      if (pending !== null) {
        delete current.pendingReaderPosition;
        setReaderPosition(reader, pending, state.settings.readerMode);
        return;
      }
      const samePage = Number(route.read?.pageIndex || 0) === Number(pageIndex);
      setReaderPosition(reader, samePage ? (route.read?.pagePosition || 0) : 0, state.settings.readerMode);
    }, 120);
  }

  function renderIdeas() {
    setTitle('ネタ帳');
    const ideas = state.ideas.slice().sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    content.innerHTML = `

  function collectTags() {
    const counts = new Map();
    const add = (tag, key) => {
      if (!tag) return;
      const item = counts.get(tag) || { tag, series: new Set(), entries: new Set(), routes: new Set(), ideas: new Set() };
      if (key.series) item.series.add(key.series);
      if (key.entry) item.entries.add(key.entry);
      if (key.route) item.routes.add(key.route);
      if (key.idea) item.ideas.add(key.idea);
      counts.set(tag, item);
    };
    state.series.forEach((series) => {
      (series.tags || []).forEach((tag) => add(tag, { series: series.id }));
      series.entries.forEach((entry) => {
        (entry.tags || []).forEach((tag) => add(tag, { series: series.id, entry: entry.id }));
        entry.routes.forEach((route) => (route.tags || []).forEach((tag) => add(tag, { series: series.id, entry: entry.id, route: route.id })));
      });
    });
    state.ideas.forEach((idea) => (idea.tags || []).forEach((tag) => add(tag, { idea: idea.id })));
    return Array.from(counts.values()).map((item) => ({ ...item, total: item.series.size + item.entries.size + item.routes.size + item.ideas.size }))
      .sort((a, b) => b.total - a.total || a.tag.localeCompare(b.tag, 'ja'));
  }

  function findByTag(tag) {
    const results = { series: [], entries: [], routes: [], ideas: [] };
    state.series.forEach((series) => {
      if ((series.tags || []).includes(tag)) results.series.push(series);
      series.entries.forEach((entry) => {
        if ((entry.tags || []).includes(tag)) results.entries.push({ series, entry });
        entry.routes.forEach((route) => {
          if ((route.tags || []).includes(tag)) results.routes.push({ series, entry, route });
        });
      });
    });
    state.ideas.forEach((idea) => {
      if ((idea.tags || []).includes(tag)) results.ideas.push(idea);
    });
    return results;
  }

        <div class="card span-6"><h3>#${escapeHTML(tag)} のネタ</h3>${results.ideas.length ? `<div class="list">${results.ideas.map((idea) => `<div class="item"><p class="item-title">${escapeHTML(idea.title)}</p><button class="ghost small" data-action="edit-idea" data-idea="${idea.id}">開く</button></div>`).join('')}</div>` : '<div class="empty">なし</div>'}</div>

  function searchAll(query) {
    const q = query.toLowerCase();
    const results = [];
    state.series.forEach((series) => {
      const seriesText = [series.title, series.description, Object.values(series.notes || {}).join('\n'), (series.tags || []).join(' ')].join('\n').toLowerCase();
      if (seriesText.includes(q)) results.push({ type: 'series', series });
      series.entries.forEach((entry) => {
        const entryText = [entry.title, entry.memo, (entry.tags || []).join(' ')].join('\n').toLowerCase();
        if (entryText.includes(q)) results.push({ type: 'entry', series, entry });
        entry.routes.forEach((route) => {
          const routeText = [route.title, route.memo, routeBody(route), (route.tags || []).join(' ')].join('\n').toLowerCase();
          if (routeText.includes(q)) results.push({ type: 'route', series, entry, route });
        });
      });
    });
    state.ideas.forEach((idea) => {
      const text = [idea.title, idea.body, (idea.tags || []).join(' ')].join('\n').toLowerCase();
      if (text.includes(q)) results.push({ type: 'idea', idea });
    });
    return results.slice(0, 100);
  }

    $('#saveRouteButton', modal).onclick = async (event) => {
      event.preventDefault();
      const shouldCopy = $('#copyCurrent', modal).checked && copyFrom;
      const body = shouldCopy ? routeBody(copyFrom) : '';
      const route = makeRoute($('#routeTitle', modal).value.trim() || 'ルートA', $('#routeType', modal).value, body);
      if (shouldCopy) {
        route.pages = cloneRoutePages(copyFrom);
        route.body = routeBody(route);
      }
      entry.routes.push(route);
      entry.updatedAt = nowISO();
      touchSeries(series);
      await saveEncryptedState(true);
      closeModal();
      navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: route.id });
    };
  }

  function openIdeaModal(idea = null) {
    const seriesOptions = ['<option value="">指定なし</option>', ...state.series.map((series) => `<option value="${series.id}" ${idea?.seriesId === series.id ? 'selected' : ''}>${escapeHTML(series.title)}</option>`)].join('');
    openModal(idea ? 'ネタ編集' : 'ネタ追加', `
      <div class="form-grid">
        <label>タイトル<input id="ideaTitle" value="${escapeHTML(idea?.title || '')}" placeholder="ネタA"></label>
        <label>状態<select id="ideaStatus">${renderOptions(statusLabels, idea?.status || 'draft')}</select></label>
        <label>関連シリーズ<select id="ideaSeries">${seriesOptions}</select></label>
        <label>タグ<input id="ideaTags" value="${escapeHTML(tagsToInput(idea?.tags || []))}" placeholder="#タグA #タグB"></label>
        <label class="full">メモ<textarea id="ideaBody">${escapeHTML(idea?.body || '')}</textarea></label>
      </div>
    `, `<button class="ghost" value="cancel">キャンセル</button><button id="saveIdeaButton" class="primary" value="default">保存</button>`);
    $('#saveIdeaButton', modal).onclick = async (event) => {
      event.preventDefault();
      if (idea) {
        idea.title = $('#ideaTitle', modal).value.trim() || 'ネタA';
        idea.status = $('#ideaStatus', modal).value;
        idea.seriesId = $('#ideaSeries', modal).value;
        idea.tags = parseTags($('#ideaTags', modal).value);
        idea.body = $('#ideaBody', modal).value;
        idea.updatedAt = nowISO();
      } else {
        const item = makeIdea($('#ideaTitle', modal).value.trim() || 'ネタA');
        item.status = $('#ideaStatus', modal).value;
        item.seriesId = $('#ideaSeries', modal).value;
        item.tags = parseTags($('#ideaTags', modal).value);
        item.body = $('#ideaBody', modal).value;
        state.ideas.unshift(item);
      }
      await saveEncryptedState(true);
      closeModal();
      toastMessage('保存しました。');
      render();
    };
  }

  function openIdeaToEntryModal(idea) {
    if (!state.series.length) return toastMessage('先にシリーズを作成してください。');
    const seriesOptions = state.series.map((series) => `<option value="${series.id}" ${idea.seriesId === series.id ? 'selected' : ''}>${escapeHTML(series.title)}</option>`).join('');
    openModal('ネタから話を作成', `
      <label>シリーズ<select id="targetSeries">${seriesOptions}</select></label>
      <label>話タイトル<input id="targetEntryTitle" value="${escapeHTML(idea.title)}"></label>
    `, `<button class="ghost" value="cancel">キャンセル</button><button id="createFromIdea" class="primary" value="default">作成</button>`);
    $('#createFromIdea', modal).onclick = async (event) => {
      event.preventDefault();
      const series = getSeries($('#targetSeries', modal).value);
      const entry = makeEntry($('#targetEntryTitle', modal).value.trim() || idea.title, '');
      entry.memo = idea.body;
      entry.tags = [...idea.tags];
      entry.routes[0].tags = [...idea.tags];
      series.entries.push(entry);
      touchSeries(series);
      idea.status = 'complete';
      idea.updatedAt = nowISO();
      await saveEncryptedState(true);
      closeModal();
      navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: entry.routes[0].id });
    };
  }

  function openIdeaToRouteModal(idea) {
    const entries = [];
    state.series.forEach((series) => series.entries.forEach((entry) => entries.push({ series, entry })));
    if (!entries.length) return toastMessage('先に話を作成してください。');
    const options = entries.map(({ series, entry }) => `<option value="${series.id}|${entry.id}">${escapeHTML(series.title)} / ${escapeHTML(entry.title)}</option>`).join('');
    openModal('ネタからIF/別ルートを作成', `
      <label>追加先<select id="targetEntry">${options}</select></label>
      <label>ルート名<input id="targetRouteTitle" value="${escapeHTML(idea.title)}"></label>
      <label>種別<select id="targetRouteType">${renderOptions(routeTypeLabels, 'if')}</select></label>
    `, `<button class="ghost" value="cancel">キャンセル</button><button id="createRouteFromIdea" class="primary" value="default">作成</button>`);
    $('#createRouteFromIdea', modal).onclick = async (event) => {
      event.preventDefault();
      const [seriesId, entryId] = $('#targetEntry', modal).value.split('|');
      const series = getSeries(seriesId);
      const entry = getEntry(seriesId, entryId);
      const route = makeRoute($('#targetRouteTitle', modal).value.trim() || idea.title, $('#targetRouteType', modal).value, idea.body);
      route.tags = [...idea.tags];
      entry.routes.push(route);
      entry.updatedAt = nowISO();
      touchSeries(series);
      idea.status = 'complete';
      idea.updatedAt = nowISO();
      await saveEncryptedState(true);
      closeModal();
      navigate('editor', { seriesId, entryId, routeId: route.id });
    };
  }

  async function copyRoute(series, entry, route) {
    const copy = JSON.parse(JSON.stringify(route));
    copy.id = uid('route');
    copy.title = `${route.title} コピー`;
    copy.type = route.type === 'main' ? 'rewrite' : route.type;
    copy.createdAt = nowISO();
    copy.updatedAt = nowISO();
    copy.bookmarks = [];
    copy.favoriteScenes = [];
    copy.read = { position: 0, pageIndex: 0, pagePosition: 0, completed: false, updatedAt: null };
    copy.pages = cloneRoutePages(route);
    copy.body = routeBody(copy);
    entry.routes.push(copy);
    entry.updatedAt = nowISO();
    touchSeries(series);
    await saveEncryptedState(true);
    navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: copy.id });
  }

  async function duplicateEntry(series, entryId) {
    const entry = series.entries.find((item) => item.id === entryId);
    if (!entry) return;
    const copy = JSON.parse(JSON.stringify(entry));
    copy.id = uid('entry');
    copy.title = `${entry.title} コピー`;
    copy.createdAt = nowISO();
    copy.updatedAt = nowISO();
    copy.routes = copy.routes.map((route) => {
      const cloned = { ...route, id: uid('route'), createdAt: nowISO(), updatedAt: nowISO(), read: { position: 0, pageIndex: 0, pagePosition: 0, completed: false, updatedAt: null }, bookmarks: [], favoriteScenes: [] };
      cloned.pages = normalizeRoutePages(route).map((page, index) => ({ ...page, id: uid('page'), order: index, createdAt: nowISO(), updatedAt: nowISO() }));
      cloned.body = routeBody(cloned);
      return cloned;
    });
    series.entries.push(copy);
    touchSeries(series);
    await saveEncryptedState(true);
    render();
  }

  async function toggleFavoriteEntry(series, entryId) {
    const entry = series.entries.find((item) => item.id === entryId);
    if (!entry) return;
    entry.favorite = !entry.favorite;
    entry.updatedAt = nowISO();
    touchSeries(series);
    await saveEncryptedState(true);
    render();
  }

  async function deleteChapter(series, chapterId) {
    const chapter = series.chapters.find((item) => item.id === chapterId);
    if (!chapter) return;
    const ok = await confirmDialog('章を削除しますか？', 'この章に入っている話は「章なし」に移動します。');
    if (!ok) return;
    series.entries.forEach((entry) => { if (entry.chapterId === chapterId) entry.chapterId = ''; });
    series.chapters = series.chapters.filter((item) => item.id !== chapterId);
    touchSeries(series);
    await saveEncryptedState(true);
    render();
  }

  function addTrash(type, label, item, parent = {}) {
    const trashItem = { id: uid('trash'), type, label, item, parent, deletedAt: nowISO() };
    state.trash.unshift(trashItem);
  }

  async function confirmDeleteSeries(series) {
    const ok = await confirmDialog('シリーズをゴミ箱へ移動しますか？', 'あとからゴミ箱で復元できます。');
    if (!ok) return;
    addTrash('series', series.title, series);
    state.series = state.series.filter((item) => item.id !== series.id);
    await saveEncryptedState(true);
    navigate('series');
  }

  async function confirmDeleteEntry(series, entryId) {
    const entry = series.entries.find((item) => item.id === entryId);
    if (!entry) return;
    const ok = await confirmDialog('話をゴミ箱へ移動しますか？', 'ルートもまとめて移動します。');
    if (!ok) return;
    addTrash('entry', entry.title, entry, { seriesId: series.id });
    series.entries = series.entries.filter((item) => item.id !== entryId);
    touchSeries(series);
    await saveEncryptedState(true);
    render();
  }

  async function confirmDeleteRoute(series, entry, route) {
    if (entry.routes.length <= 1) return toastMessage('最後のルートは削除できません。');
    const ok = await confirmDialog('このルートをゴミ箱へ移動しますか？', 'あとから復元できます。');
    if (!ok) return;
    addTrash('route', `${entry.title} / ${route.title}`, route, { seriesId: series.id, entryId: entry.id });
    entry.routes = entry.routes.filter((item) => item.id !== route.id);
    entry.updatedAt = nowISO();
    touchSeries(series);
    await saveEncryptedState(true);
    navigate('editor', { seriesId: series.id, entryId: entry.id, routeId: entry.routes[0].id });
  }

  async function deleteIdea(idea) {
    const ok = await confirmDialog('ネタをゴミ箱へ移動しますか？', 'あとから復元できます。');
    if (!ok) return;
    addTrash('idea', idea.title, idea);
    state.ideas = state.ideas.filter((item) => item.id !== idea.id);
    await saveEncryptedState(true);
    render();
  }

  async function restoreTrash(trashId) {
    const trashItem = state.trash.find((item) => item.id === trashId);
    if (!trashItem) return;
    if (trashItem.type === 'series') state.series.unshift(trashItem.item);
    if (trashItem.type === 'idea') state.ideas.unshift(trashItem.item);
    if (trashItem.type === 'entry') {
      const series = getSeries(trashItem.parent.seriesId);
      if (!series) return toastMessage('復元先シリーズがありません。');
      series.entries.push(trashItem.item);
      touchSeries(series);
    }
    if (trashItem.type === 'route') {
      const entry = getEntry(trashItem.parent.seriesId, trashItem.parent.entryId);
      const series = getSeries(trashItem.parent.seriesId);
      if (!entry || !series) return toastMessage('復元先の話がありません。');
      entry.routes.push(trashItem.item);
      entry.updatedAt = nowISO();
      touchSeries(series);
    }
    state.trash = state.trash.filter((item) => item.id !== trashId);
    await saveEncryptedState(true);
    render();
  }

  async function finalDeleteTrash(trashId) {
    const ok = await confirmDialog('完全削除しますか？', 'この操作は戻せません。');
    if (!ok) return;
    state.trash = state.trash.filter((item) => item.id !== trashId);
    await saveEncryptedState(true);
    render();
  }

  function confirmDialog(title, message) {
    return new Promise((resolve) => {
      openModal(title, `<p>${escapeHTML(message)}</p>`, `<button id="cancelConfirm" class="ghost" value="cancel">キャンセル</button><button id="okConfirm" class="danger-button" value="default">OK</button>`);
      $('#cancelConfirm', modal).onclick = (event) => { event.preventDefault(); closeModal(); resolve(false); };
      $('#okConfirm', modal).onclick = (event) => { event.preventDefault(); closeModal(); resolve(true); };
      modal.addEventListener('close', function onClose() { modal.removeEventListener('close', onClose); resolve(false); }, { once: true });
    });
  }

  function exportJSON() {
    const data = JSON.stringify({ exportedAt: nowISO(), state }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `novel_backup_${todayKey()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toastMessage('バックアップを作成しました。');
  }

  async function importJSON() {
    const file = $('#importFile', content).files?.[0];
    if (!file) return toastMessage('ファイルを選んでください。');
    const text = await file.text();
    let parsed;
    try { parsed = JSON.parse(text); } catch (error) { return toastMessage('JSONファイルを読めませんでした。'); }
    const nextState = parsed.state || parsed;
    if (!nextState.series || !nextState.ideas) return toastMessage('バックアップ形式が違います。');
    const ok = await confirmDialog('復元しますか？', '現在のデータをバックアップ内容に置き換えます。');
    if (!ok) return;
    state = nextState;
    state.updatedAt = nowISO();
    await saveEncryptedState(true);
    toastMessage('復元しました。');
    navigate('home');
  }

  async function openPasscodeChangeModal() {
    openModal('パスコード変更', `
      <div class="form-grid">
        <label class="full">現在のパスコード<input id="oldPass" type="password" inputmode="numeric"></label>
        <label>新しいパスコード<input id="newPass" type="password" inputmode="numeric"></label>
        <label>新しいパスコード確認<input id="newPass2" type="password" inputmode="numeric"></label>
      </div>
    `, `<button class="ghost" value="cancel">キャンセル</button><button id="changePassButton" class="primary" value="default">変更</button>`);
    $('#changePassButton', modal).onclick = async (event) => {
      event.preventDefault();
      const oldPass = $('#oldPass', modal).value;
      const newPass = $('#newPass', modal).value;
      const newPass2 = $('#newPass2', modal).value;
      if (newPass.length < 4) return toastMessage('4桁以上にしてください。');
      if (newPass !== newPass2) return toastMessage('確認が一致しません。');
      try {
        await unlock(oldPass);
        const backupState = state;
        await setupPasscode(newPass);
        state = backupState;
        await saveEncryptedState(true);
        closeModal();
        toastMessage('パスコードを変更しました。');
        render();
      } catch (error) {
        toastMessage(error.message || '変更できませんでした。');
      }
    };
  }

  async function confirmResetAll() {
    const ok = await confirmDialog('全データを初期化しますか？', 'パスコード・小説データ・バックアップ以外の端末内データを削除します。先にバックアップを作成してください。');
    if (!ok) return;
    await resetAllData();
  }

  function bindGlobalEvents() {
    $('#lockForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const pass = $('#passcodeInput').value;
      try {
        if (!hasPasscode()) {
          const pass2 = $('#passcodeConfirmInput').value;
          if (pass.length < 4) return toastMessage('4桁以上にしてください。');
          if (pass !== pass2) return toastMessage('確認が一致しません。');
          await setupPasscode(pass);
        } else {
          await unlock(pass);
        }
        showMainApp();
      } catch (error) {
        console.error(error);
        toastMessage(error.message || '開けませんでした。');
      }
    });

    $('#resetPasscodeButton').addEventListener('click', async () => {
      const ok = await confirmDialog('初期化しますか？', 'パスコードを忘れた場合は、端末内データも削除されます。バックアップがある場合だけ復元できます。');
      if (ok) await resetAllData();
    });

    $('#lockNowButton').addEventListener('click', () => {
      state = null;
      sessionKey = null;
      clearTimeout(autosaveTimer);
      showLockScreen();
    });

    $('#menuButton').addEventListener('click', () => $('#sideNav').classList.toggle('open'));
    $('#sideNav').addEventListener('click', (event) => {
      const button = event.target.closest('.nav-item');
      if (!button) return;
      navigate(button.dataset.view, { tag: '', query: '' });
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && state?.settings?.lockOnHide) {
        saveEncryptedState(true).catch(console.error);
      }
    });

    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    }
  }

  async function init() {
    try {
      db = await openDB();
      bindGlobalEvents();
      if (isFirebaseConfigured()) ensureFirebase().catch((error) => { console.warn(error); cloudMessage = error.message || 'Firebase初期化に失敗しました。'; });
      showLockScreen();
    } catch (error) {
      app.classList.remove('is-loading');
      lockScreen.innerHTML = `<div class="lock-card"><h1>起動できませんでした</h1><p>${escapeHTML(error.message)}</p></div>`;
    }
  }

  init();
})();

  </script>
</body>
</html>
